<div class="registration-form">
    <h2>რეგისტრაცია</h2>
    
    <form (ngSubmit)="onSubmit()" #userForm="ngForm">

      <div class="form-group">
       <div class="row">
        <div class="col-6">
          <label for="firstName">სახელი</label>
        </div>
        <div class="col-6">
          <div *ngIf="firstname.touched && user().firstName === ''">
            <span style="color: red;">სავალდებულო ველი</span>
          </div>
        </div>
       </div>
        <input type="text" id="firstName" name="firstName" placeholder="( მინიმუმ 5 სიმბოლო )" #firstname="ngModel" [ngModel]="user().firstName" (ngModelChange)="updateUserField('firstName', $event)" required>
      </div>

      <div class="form-group email-group">
        <div class="row">
          <div class="col-6">
            <label for="email">Email</label>
          </div>
          <div class="col-6">
            <div *ngIf="email.touched && user().email === ''">
              <span style="color: red;">სავალდებულო ველი</span>
            </div>
          </div>
         </div>
        <input type="email" id="email" name="email" #email="ngModel" [ngModel]="user().email" (ngModelChange)="updateUserField('email', $event)" required class="email-input">
        <img (click)="sendactivationcode(user().email)" class="right-arrow-img" src="../../../assets/mail-right-arrow.png" alt="Right Arrow">
      </div>
      
      <div class="form-group">
        <div class="row">
          <div class="col-6">
            <label for="idNumber">პირადი</label>
          </div>
          <div class="col-6">
            <div *ngIf="idNumber.touched && user().idNumber === ''">
              <span style="color: red;">სავალდებულო ველი</span>
            </div>
          </div>
         </div>
        <input type="text" id="idNumber" name="idNumber" #idNumber="ngModel" placeholder="00000000000" maxlength="11" [ngModel]="user().idNumber" (ngModelChange)="updateUserField('idNumber', $event)" required>
      </div>
      
      <div class="form-group">
        <div class="row">
          <div class="col-6">
            <label for="lastName">გვარი</label>
          </div>
          <div class="col-6">
            <div *ngIf="lastName.touched && user().lastName === ''">
              <span style="color: red;">სავალდებულო ველი</span>
            </div>
          </div>
         </div>
        <input type="text" id="lastName" #lastName="ngModel" name="lastName" [ngModel]="user().lastName" (ngModelChange)="updateUserField('lastName', $event)" required>
      </div>

      <div class="form-group">
        <div class="row">
          <div class="col-6 activeMesStyle" style="flex: 0 0 100%; max-width: 100%;">
            <div class="labels">
              <label for="activationCode">აქტივაციის კოდი</label>
            </div>
            <div *ngIf="activationMessage() != ''" class="labels">
            <label (click)="resendactivationcode(user().email)" class="vada" for="">{{activationMessage()}}</label>
          </div>
            <div *ngIf="activationCode.touched && activationMessage() === ''">
              <span style="color: red;">სავალდებულო ველი</span>
            </div>
          </div>
         </div>
        <div class="activation">
          <input type="text" id="activationCode" #activationCode="ngModel" name="activationCode" [ngModel]="user().activationCode" (ngModelChange)="updateUserField('activationCode', $event)" required>
          <div *ngIf="!timerRunning() && activationCode.touched">
            <span>*ბმულის მოქმედების ვადა ამოიწურა</span>
          </div>
        </div>
      </div>
  
      <div class="form-group">
        <div class="row">
          <div class="col-6">
            <label for="password">პაროლი</label>
          </div>
          <div class="col-6">
            <div *ngIf="password.touched && user().password === ''">
              <span style="color: red;">სავალდებულო ველი</span>
            </div>
          </div>
         </div>
        <input type="password" #password="ngModel" id="password" name="password" placeholder="( მინიმუმ 8 სიმბოლო : @ 7 , )" [ngModel]="user().password" (ngModelChange)="updateUserField('password', $event)" required>
      </div>
      <div class="button">
        <button [disabled]="isButtonDisabled()" type="submit">{{buttonText()}}</button>
      </div>
    </form>
  </div>
