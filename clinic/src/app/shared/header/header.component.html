
<!-- header.component.html -->
<div class="header">
  <!-- first-section -->
    <div class="first-section">
      <div class="nav-bar-1">
        <a routerLink="/home" class="logo-link">
          <img src="../../../assets/logo1.png" alt="Logo">
          <span class="logo-text">კლინიკა</span>
        </a>

        <div class="nav-bar-flex-col">
          <ul class="nav-bar">
            <li routerLink="/home" style="cursor: pointer;">
              ექიმები
              <div class="vector-line-hover"></div>
            </li>
            <li routerLink="/clinics" style="cursor: pointer;">
              კლინიკები
              <div class="vector-line-hover"></div>
            </li>
            <li routerLink="/annotations" style="cursor: pointer;">
              ანოტაციები
              <div class="vector-line-hover"></div>
            </li>
            <li routerLink="/offers" style="cursor: pointer;">
              აქციები
              <div class="vector-line-hover"></div>
            </li>
            <li routerLink="/services" style="cursor: pointer;">
              სერვისები
              <div class="vector-line-hover"></div>
            </li>
            <li routerLink="/medications" style="cursor: pointer;">
              მედიკამენტები
              <div class="vector-line-hover"></div>
            </li>
            <li routerLink="/contact" style="cursor: pointer;">
              კონტაქტი
              <div class="vector-line-hover"></div>
            </li>
          </ul>
        </div>
        

        <!-- button section -->
        <div [ngClass]="{'navbar-button': !isLoggedIn(), 'navbar-button2': isLoggedIn() || isAdministrator()}">
          
          <!-- Theme Toggle -->
          <button class="button-eng" (click)="themeService.toggleTheme()" style="margin-right: 10px;">
            <i [class]="isDarkMode() ? 'pi pi-sun' : 'pi pi-moon'" [style.color]="isDarkMode() ? '#FFD700' : '#053354'"></i>
          </button>

          <button class="button-reg-aut" *ngIf="!isLoggedIn() && !isAdministrator() && !isDoctor()">
            <span class="button-registartion" (click)="navigateToRegistration()">რეგისტრაცია</span>
            <span class="button-aut" data-toggle="modal" data-target="#exampleModal" data-whatever="@mdo"> / ავტორიზაცია</span>
          </button>
        
          <button class="button-reg-aut2" (click)="navigateClient()" *ngIf="isLoggedIn() && !isAdministrator() && !isDoctor()">
            <img src="../../../assets/default-image.png" alt="">
            <span class="button-registartion">{{ authUser()?.firstName }} {{ authUser()?.lastName }}</span>
          </button>
          <button class="button-reg-aut2" (click)="navigateDoctor()" *ngIf="isDoctor()">
            <img [src]="authUser()?.imageUrl" alt="">
            <span class="button-registartion">{{ authUser()?.firstName }} {{ authUser()?.lastName }}</span>
          </button>
        
          <button class="button-reg-aut2" (click)="navigateAdmin()" *ngIf="isAdministrator()">
            <img src="../../../assets/Ellipse-222(1).png" alt="">
            <span class="button-registartion">ადმინისტრატორი</span>
          </button>
  
          <button class="button-eng" (click)="onLogoutClick()">
            <!-- <span>ENG</span> -->
            <img src="../../../assets/logout.png" alt="logout">
          </button>
        </div>
      </div>
    </div>
    <div class="mobile-navbar">
      <nav class="navbar navbar-expand-lg navbar-light bg-light rounded">
        <a routerLink="/home" class="logo-link">
          <img src="../../../assets/logo1.png" alt="Logo">
          <span class="logo-text">კლინიკა</span>
        </a>
        
        <div class="d-flex align-items-center">
          <button class="button-eng mr-2" (click)="themeService.toggleTheme()">
            <i [class]="isDarkMode() ? 'pi pi-sun' : 'pi pi-moon'"></i>
          </button>
          <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarsExample01" aria-controls="navbarsExample01" aria-expanded="true" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
        </div>
  
        <div class="navbar-collapse collapse" id="navbarsExample01">
          <ul class="navbar-nav mr-auto">
            <li routerLink="/home">ექიმები</li>
            <li routerLink="/clinics">კლინიკები</li>
            <li routerLink="/medications">მედიკამენტები</li>
            <li routerLink="/contact">კონტაქტი</li>
            <li class="nav-item">
              <div [ngClass]="{'navbar-button': !isLoggedIn(), 'navbar-button2': isLoggedIn() || isAdministrator()}">
                <button class="button-reg-aut" *ngIf="!isLoggedIn() && !isAdministrator() && !isDoctor()">
                  <span class="button-registartion" (click)="navigateToRegistration()">რეგისტრაცია</span>
                  <span class="button-aut" data-toggle="modal" data-target="#exampleModal" data-whatever="@mdo">ავტორიზაცია</span>
                </button>
              
                <button class="button-reg-aut2" (click)="navigateClient()" *ngIf="isLoggedIn() && !isAdministrator() && !isDoctor()">
                  <img src="../../../assets/default-image.png" alt="">
                  <span class="button-registartion">{{ authUser()?.firstName }} {{ authUser()?.lastName }}</span>
                </button>
                <button class="button-reg-aut2" (click)="navigateDoctor()" *ngIf="isDoctor()">
                  <img [src]="authUser()?.imageUrl" alt="">
                  <span class="button-registartion">{{ authUser()?.firstName }} {{ authUser()?.lastName }}</span>
                </button>
              
                <button class="button-reg-aut2" (click)="navigateAdmin()" *ngIf="isAdministrator()">
                  <img src="../../../assets/Ellipse-222(1).png" alt="">
                  <span class="button-registartion">ადმინისტრატორი</span>
                </button>

              </div>
            </li>
          </ul>
        </div>
      </nav>
    </div>

    <div class="second-section">
      <div class="header-elements">
        <div class="header-element1">
          <div class="header-element-1">
            <div class="img-color">
              <img src="../../../assets/call.png" alt="Logo">
            </div>
            <p>032 2 100 100</p>
          </div>
          <div class="header-element-1">
            <div class="img-color">
              <img src="../../../assets/location.png" alt="Logo">
            </div>
            <p>იაკობ ნიკოლაძე №10</p>
          </div>
        </div>
        <div class="header-element2">
          <div class="header-element-2">
            <input type="text" placeholder="მოძებნე ექიმი სახელით">
          </div>
          <div class="header-element-2">
            <input class="grey-elem" type="text" placeholder="მოძებნე სპეციალობით">
          </div>
          <div class=" img-back">
            <img src="../../../assets/search.png" alt="Logo">
          </div>
        </div>
      </div>
    </div>
  </div>
  


  <!-- modal -->
  <div class="modal fade" id="exampleModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="exampleModalLabel">ავტორიზაცია</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Close" style="border: none; background: transparent; font-size: 24px; color: var(--text-muted);">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
          <form (ngSubmit)="onSubmit()">
            <div class="form-group mb-4">
              <label for="recipient-email" style="margin-left: 20px; font-weight: 600; font-size: 13px; color: var(--text-muted);">ელ.ფოსტა / ტელეფონი</label>
              <input type="text" class="form-control" [(ngModel)]="loginData.email" name="email" id="recipient-email" placeholder="email@example.com" required>
            </div>
            <div class="form-group mb-2">
              <label for="recipient-name" style="margin-left: 20px; font-weight: 600; font-size: 13px; color: var(--text-muted);">პაროლი</label>
              <input type="password" [(ngModel)]="loginData.password" name="password" class="form-control form-password" id="recipient-name" placeholder="********" required>
            </div>
            <div class="text-right mb-4">
              <span class="forget-password" (click)="sendResetCode()" style="color: var(--text-accent); font-weight: 700; cursor: pointer; font-size: 13px;">პაროლის აღდგენა</span>
            </div>
          
            <div class="modal-footer" style="padding-top: 20px; border-top: 1px solid var(--border-color);">
              <button type="submit" class="btn btn-primary w-100" style="height: 50px; border-radius: 50px; background-color: var(--text-main); color: white; border: none; font-weight: 700;">
                {{ submissionSuccess ? 'დახურვა' : 'შესვლა' }}
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
  <p-toast [showTransformOptions]="'translateY(100%)'" [showTransitionOptions]="'1000ms'" ></p-toast>
