<div class="doctors">
    <div class="square-container">
        <!-- Skeleton Loaders -->
        <ng-container *ngIf="isLoading()">
            <div *ngFor="let item of skeletonItems" class="user-card skeleton-card">
                <div class="square">
                    <div class="upper">
                        <p-skeleton width="60px" height="20px" borderRadius="10px"></p-skeleton>
                    </div>
                    <div class="middle">
                        <p-skeleton shape="circle" size="120px" styleClass="mb-4"></p-skeleton>
                        <p-skeleton width="60%" height="24px" styleClass="mb-2" borderRadius="12px"></p-skeleton>
                        <p-skeleton width="40%" height="16px" styleClass="mb-4" borderRadius="10px"></p-skeleton>
                        <div class="stars" style="justify-content: center; gap: 4px;">
                            <p-skeleton shape="circle" size="16px" *ngFor="let i of [1,2,3,4,5]"></p-skeleton>
                        </div>
                        <p-skeleton width="100%" height="48px" borderRadius="50px" styleClass="mt-6"></p-skeleton>
                    </div>
                </div>
            </div>
        </ng-container>

        <!-- Actual Cards -->
        <div *ngFor="let doctor of visibleDoctors()" class="user-card" @fadeInOut>
            <div class="square">
                <div class="upper">
                    <div class="viewers">
                        <img src="../../../assets/ic_baseline-remove-red-eye.png" alt="">
                        <p>129 371</p>
                    </div>
                    <img src="../../../assets/pin-svgrepo-com1.png" alt="">
                </div>
                <div class="middle">
                    <img class="picture" [src]="doctor.imageUrl" alt="">
                    <p class="card-name">{{ doctor.firstName }}  {{ doctor.lastName}}</p>
                    <p class="card-category">{{doctor.category}}</p>
                   
                    <div class="stars">
                      <ng-container *ngFor="let star of getStarArray(doctor.starNum)">
                          <img src="../../../assets/material-symbols_star-rounded.png" alt="Star">
                        </ng-container>
                  </div>
                  <button type="button" (click)="onBookingClick(doctor)">
                    <p>მიღებაზე ჩაწერა</p>
                    <div class="buttons-span"></div>
                    <!-- <img class="material-symbol" src="../../../assets/material-symbols_arrow-back-ios-rounded333.png" alt=""> -->
                </button>
                </div>
            </div>
    </div>

      </div>
      <div class="read-more"  *ngIf="maxVisibleDoctors() < alldoctors().length" (click)="toggleSeeMore()">
          <p>სრულად ნახვა</p>
          <img src="../../../assets/Vector 5.png" alt="vector5">
      </div>
</div>
